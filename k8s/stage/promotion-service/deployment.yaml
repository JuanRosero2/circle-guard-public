---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: promotion-service
  namespace: cg-stage
  labels:
    app: promotion-service
    env: stage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: promotion-service
  template:
    metadata:
      labels:
        app: promotion-service
    spec:
      containers:
        - name: promotion-service
          image: circleguard/promotion-service:stage
          ports:
            - containerPort: 8088
          envFrom:
            - configMapRef:
                name: promotion-service-config
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              value: password
            - name: SPRING_LDAP_PASSWORD
              value: admin
            - name: SPRING_NEO4J_AUTHENTICATION_PASSWORD
              value: password
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8088
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8088
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
