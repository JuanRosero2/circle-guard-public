---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: cg-master
  labels:
    app: gateway-service
    env: master
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: circleguard/gateway-service:master
          ports:
            - containerPort: 8087
          envFrom:
            - configMapRef:
                name: gateway-service-config
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              value: password
            - name: SPRING_LDAP_PASSWORD
              value: admin
            - name: SPRING_NEO4J_AUTHENTICATION_PASSWORD
              value: password
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8087
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
