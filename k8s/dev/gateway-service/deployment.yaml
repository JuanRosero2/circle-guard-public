---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: cg-dev
  labels:
    app: gateway-service
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: circleguard/gateway-service:dev
          ports:
            - containerPort: 8087
          envFrom:
            - configMapRef:
                name: gateway-service-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8087
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: cg-dev
spec:
  selector:
    app: gateway-service
  ports:
    - port: 8087
      targetPort: 8087
  type: ClusterIP
