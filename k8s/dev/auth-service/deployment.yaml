---
# Deployment para auth-service en cg-dev
# 1 réplica en dev — no requiere HA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: cg-dev
  labels:
    app: auth-service
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: circleguard/auth-service:dev
          ports:
            - containerPort: 8180
          envFrom:
            - configMapRef:
                name: auth-service-config
          env:
            # La password se inyecta como variable individual para evitar
            # exponerla en el ConfigMap (en producción usar Secret)
            - name: SPRING_DATASOURCE_PASSWORD
              value: password
            - name: SPRING_LDAP_PASSWORD
              value: admin
            - name: SPRING_NEO4J_AUTHENTICATION_PASSWORD
              value: password
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8180
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8180
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
