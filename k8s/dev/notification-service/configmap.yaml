---
# ConfigMap para notification-service — ambiente dev
# NO tiene base de datos propia; consume de Kafka y llama a auth-service
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: cg-dev
data:
  SPRING_PROFILES_ACTIVE: dev
  SERVER_PORT: "8082"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-service:9092
  AUTH_API_URL: http://auth-service:8180
  JWT_SECRET: "my-super-secret-dev-key-32-chars-long-12345678"
