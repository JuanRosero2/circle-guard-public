---
# StatefulSet para Neo4j 5.26 con plugin APOC
# Utilizado exclusivamente por promotion-service para el grafo de contactos
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: cg-dev
spec:
  serviceName: neo4j-service
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.26
          ports:
            - containerPort: 7474   # HTTP Browser
            - containerPort: 7687   # Bolt protocol (usado por Spring Data Neo4j)
          env:
            - name: NEO4J_AUTH
              value: neo4j/password
            - name: NEO4J_PLUGINS
              value: '["apoc"]'
            - name: NEO4J_dbms_connector_bolt_listen__address
              value: ":7687"
            - name: NEO4J_dbms_connector_bolt_advertised__address
              value: ":7687"
          volumeMounts:
            - name: neo4jdata
              mountPath: /data
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 30
            periodSeconds: 15
  volumeClaimTemplates:
    - metadata:
        name: neo4jdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-service
  namespace: cg-dev
spec:
  selector:
    app: neo4j
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
  clusterIP: None
