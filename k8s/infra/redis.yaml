---
# Redis 7.2 — usado por gateway-service (caché de tokens JWT/QR)
# y promotion-service (caché de estado del usuario)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: cg-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: cg-dev
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
