apiVersion: v1
kind: ConfigMap
metadata:
  name: form-service-config
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/circleguard_form"
  SPRING_DATASOURCE_USERNAME: "admin"
  SPRING_DATASOURCE_PASSWORD: "password"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: form-service
  labels:
    app: form-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: form-service
  template:
    metadata:
      labels:
        app: form-service
    spec:
      containers:
        - name: form-service
          image: juan0073/circleguard-form-service:latest
          ports:
            - containerPort: 8086
          envFrom:
            - configMapRef:
                name: form-service-config
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: form-service
spec:
  selector:
    app: form-service
  ports:
    - port: 8086
      targetPort: 8086
  type: ClusterIP
