apiVersion: v1
kind: ConfigMap
metadata:
  name: identity-service-config
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/circleguard_identity"
  SPRING_DATASOURCE_USERNAME: "admin"
  SPRING_DATASOURCE_PASSWORD: "password"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  VAULT_SECRET: "746573742d7365637265742d33322d63686172732d6c6f6e672d313233343536"
  VAULT_SALT: "deadbeef"
  VAULT_HASH_SALT: "12345678"
  JWT_SECRET: "my-super-secret-dev-key-with-more-than-sixty-four-characters-for-safety-1234567890"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  labels:
    app: identity-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: juan0073/circleguard-identity-service:latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: identity-service-config
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
spec:
  selector:
    app: identity-service
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP
