---
# Namespaces para los 3 ambientes de CircleGuard
# cg-dev:    CI automático en cada push a main
# cg-stage:  Validación de integración y E2E antes de producción
# cg-master: Producción — solo con aprobación manual del tech-lead
apiVersion: v1
kind: Namespace
metadata:
  name: cg-dev
  labels:
    env: dev
    project: circleguard
---
apiVersion: v1
kind: Namespace
metadata:
  name: cg-stage
  labels:
    env: stage
    project: circleguard
---
apiVersion: v1
kind: Namespace
metadata:
  name: cg-master
  labels:
    env: master
    project: circleguard
