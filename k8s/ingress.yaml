---
# Ingress para exponer circleguard-gateway-service al exterior
# El gateway es el único punto de entrada público; todos los demás
# servicios son ClusterIP internos.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: circleguard-ingress
  namespace: cg-master
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
spec:
  ingressClassName: nginx
  rules:
    - host: api.circleguard.edu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 8087
